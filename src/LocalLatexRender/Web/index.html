<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaTeX Render Bridge</title>
    <link rel="stylesheet" href="./vendor/katex/dist/katex.min.css">
    <style>
        :root {
            color-scheme: light;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI Variable", "Segoe UI", sans-serif;
            user-select: none;
        }

        #stage {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #equation {
            display: inline-block;
            max-width: calc(100vw - 64px);
            max-height: calc(100vh - 64px);
            color: #fff;
            background: #000;
        }

        #equation.display {
            display: block;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="equation" aria-live="polite"></div>
    </div>

    <script src="./vendor/katex/dist/katex.min.js"></script>
    <script src="./bridge.js"></script>
</body>
</html>
