name: Bug report
description: Report a reproducible bug or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps, clipboard content, and settings if relevant.
      placeholder: |
        1. Open the app
        2. Paste formula ...
        3. Choose 5x output
        4. Copy result
        5. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Windows version, .NET SDK version, app version/commit
  - type: textarea
    id: artifacts
    attributes:
      label: Logs or screenshots
      description: Paste logs, screenshots, or sample PNG details if available.

